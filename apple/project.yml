name: AIUsage
options:
  bundleIdPrefix: com.happenings
  createIntermediateGroups: true
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    DEVELOPMENT_TEAM: "9JLJ6MJLMJ"
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "0.1.0"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  AIUsage:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ../Sources/AiUsageMenuApp/Models.swift
      - path: ../Sources/AiUsageMenuApp/Formatting.swift
      - path: Apps/iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.happenings.aiusage
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Apps/iOS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
